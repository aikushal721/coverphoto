<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK721 Studio | Shree Ram Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f8f9fa;
            --sidebar-bg: #ffffff;
            --primary: #4f46e5;
            --text-dark: #1a1d23;
            --text-muted: #64748b;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 0; background-color: var(--bg-body);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 24px;
        }
        .logo { font-size: 20px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
        .menu-item { 
            padding: 12px 16px; border-radius: 12px; color: var(--text-muted); 
            text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 12px;
            margin-bottom: 8px; transition: 0.3s;
        }
        .menu-item.active { background: #f0f0ff; color: var(--primary); }
        .sidebar-footer { margin-top: auto; font-size: 12px; color: var(--text-muted); text-align: center; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }

        /* Topbar */
        .topbar {
            padding: 20px 40px; background: rgba(248, 249, 250, 0.8);
            backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 10;
        }
        .topbar h1 { font-size: 20px; font-weight: 700; margin: 0; color: var(--text-dark); }
        .topbar-right { display: flex; align-items: center; gap: 20px; }
        .insta-link { font-size: 22px; color: var(--text-dark); transition: 0.3s; }
        .insta-link:hover { color: #e1306c; transform: translateY(-2px); }

        /* Dashboard Canvas Area */
        .workspace { padding: 0 40px 40px 40px; display: flex; flex-direction: column; align-items: center; }
        
        .canvas-card {
            background: #ffffff; padding: 30px; border-radius: 24px;
            box-shadow: var(--card-shadow); border: 1px solid var(--border);
            width: 100%; max-width: 1000px; display: flex; flex-direction: column; align-items: center;
            position: relative;
        }

        .canvas-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .status-badge { background: #dcfce7; color: #15803d; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }

        /* Canvas Fitting Logic */
        .canvas-wrapper {
            width: 100%; background: #f1f5f9; border-radius: 16px; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            box-sizing: border-box; overflow: hidden;
        }
        canvas {
            max-width: 100%; height: auto !important; 
            max-height: 65vh; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-radius: 4px; background: white;
            cursor: pointer;
            touch-action: none; /* ઝૂમ કરતી વખતે પેજ સ્ક્રોલ ના થાય તે માટે */
        }
        canvas:active {
            cursor: grabbing;
        }

        /* Bottom Actions */
        .action-bar { display: flex; gap: 12px; margin-top: 25px; }
        .btn {
            padding: 12px 24px; border-radius: 12px; font-weight: 600; font-size: 14px;
            cursor: pointer; border: none; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-reset { background: #fee2e2; color: #ef4444; }
        .btn-reset:hover { background: #fecaca; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }

        /* Footer minimal */
        .footer-minimal {
            padding: 24px 40px; border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted);
        }
        .footer-links { display: flex; gap: 20px; }
        .footer-links a { color: var(--text-muted); text-decoration: none; }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .topbar { padding: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><i class="fa-solid fa-wand-magic-sparkles"></i> HK721 Studio</div>
        <nav>
            <a href="#" class="menu-item active"><i class="fa-solid fa-border-all"></i> Dashboard</a>
            <a href="#" class="menu-item"><i class="fa-solid fa-print"></i> Recent Prints</a>
            <a href="#" class="menu-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </nav>
        <div class="sidebar-footer">© 2026 Kushal Hirpara</div>
    </aside>

    <div class="main-content">
        
        <header class="topbar">
            <h1>Shree Ram Mobile & Accessories</h1>
            <div class="topbar-right">
                <a href="https://www.instagram.com/mr.hirapara.721/" target="_blank" class="insta-link">
                    <i class="fa-brands fa-instagram"></i>
                </a>
            </div>
        </header>

        <div class="workspace">
            <div class="canvas-card">
                <div class="canvas-header">
                    <span style="font-weight: 600; font-size: 14px; color: var(--text-muted);">Live Preview (A4 Layout)</span>
                    <span class="status-badge" id="status">Ready</span>
                </div>

                <div class="canvas-wrapper" id="canvasDropZone">
                    <canvas id="myCanvas"></canvas>
                    <input type="file" id="leftFilePicker" accept="image/*" style="display:none;">
                    <input type="file" id="rightFilePicker" accept="image/*" style="display:none;">
                </div>

                <div class="action-bar">
                    <button class="btn btn-reset" onclick="resetControls()">
                        <i class="fa-solid fa-rotate-left"></i> Reset
                    </button>
                    <button class="btn btn-primary" onclick="downloadJPG()">
                        <i class="fa-solid fa-image"></i> Export JPG
                    </button>
                    <button class="btn btn-primary" style="background: #111827;" onclick="downloadPDF()">
                        <i class="fa-solid fa-file-pdf"></i> Export PDF
                    </button>
                </div>
            </div>
        </div>

        <footer class="footer-minimal">
            <div>© 2026 Graphy. All rights reserved.</div>
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms</a>
                <a href="#">Support</a>
            </div>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        const leftFilePicker = document.getElementById('leftFilePicker');
        const rightFilePicker = document.getElementById('rightFilePicker');

        let templateImg = new Image();

        // ઈમેજના ઝૂમ અને ડ્રેગ ડેટા સ્ટોર કરવા માટેના ઓબ્જેક્ટ્સ
        const leftState = { img: new Image(), src: "", scale: 1, dx: 0, dy: 0 };
        const rightState = { img: new Image(), src: "", scale: 1, dx: 0, dy: 0 };

        const MASK_LEFT = { x: 0.12, y: 0.03, w: 0.35, h: 0.94 };
        const MASK_RIGHT = { x: 0.55, y: 0.03, w: 0.35, h: 0.94 };

        templateImg.src = 'template.png'; 
        templateImg.onload = function() {
            canvas.width = templateImg.width || 3508; 
            canvas.height = templateImg.height || 2480;
            generatePreview();
        };

        function getMasksPx() {
            return {
                left: { x: canvas.width * MASK_LEFT.x, y: canvas.height * MASK_LEFT.y, w: canvas.width * MASK_LEFT.w, h: canvas.height * MASK_LEFT.h },
                right: { x: canvas.width * MASK_RIGHT.x, y: canvas.height * MASK_RIGHT.y, w: canvas.width * MASK_RIGHT.w, h: canvas.height * MASK_RIGHT.h }
            };
        }

        // નવી ઈમેજ લોડ થાય ત્યારે તેને બરાબર વચ્ચે ગોઠવવી
        function loadFile(file, state, maskPxFn) {
            const reader = new FileReader();
            reader.onload = function(event) { 
                state.src = event.target.result;
                state.img.src = event.target.result;
                state.img.onload = () => {
                    const maskPx = maskPxFn();
                    let imgRatio = state.img.width / state.img.height;
                    let maskRatio = maskPx.w / maskPx.h;
                    
                    // શરુઆતમાં ફોટો પૂરા બોક્સમાં આવી જાય તે માટે સ્કેલ સેટ કરવો
                    if (imgRatio > maskRatio) {
                        state.scale = maskPx.h / state.img.height;
                    } else {
                        state.scale = maskPx.w / state.img.width;
                    }
                    
                    // ફોટાને સેન્ટરમાં લાવવો
                    let renderW = state.img.width * state.scale;
                    let renderH = state.img.height * state.scale;
                    state.dx = (maskPx.w / 2) - (renderW / 2);
                    state.dy = (maskPx.h / 2) - (renderH / 2);
                    
                    generatePreview(); 
                }
            }
            if (file) reader.readAsDataURL(file);
        }

        leftFilePicker.addEventListener('change', (e) => loadFile(e.target.files[0], leftState, () => getMasksPx().left));
        rightFilePicker.addEventListener('change', (e) => loadFile(e.target.files[0], rightState, () => getMasksPx().right));

        function getCanvasCoords(event) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX = event.clientX;
            let clientY = event.clientY;

            // જો મોબાઈલ ટચ હોય તો 
            if(event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            }

            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY,
                rawX: clientX,
                rawY: clientY
            };
        }

        function isCoordInMask(coords, maskPx) {
            return coords.x >= maskPx.x && coords.x <= maskPx.x + maskPx.w &&
                   coords.y >= maskPx.y && coords.y <= maskPx.y + maskPx.h;
        }

        // --- ડ્રેગ (Drag) અને ક્લિક (Click) નું લોજીક ---
        let isDragging = false;
        let activeState = null;
        let startMouseX, startMouseY;
        let startDx, startDy;
        let dragHasMoved = false;
        let initialPinchDistance = null;

        function startInteraction(e) {
            const coords = getCanvasCoords(e);
            const masks = getMasksPx();

            if (isCoordInMask(coords, masks.left)) activeState = leftState;
            else if (isCoordInMask(coords, masks.right)) activeState = rightState;
            else activeState = null;

            startMouseX = coords.rawX;
            startMouseY = coords.rawY;
            
            if (activeState && activeState.src) {
                isDragging = true;
                startDx = activeState.dx;
                startDy = activeState.dy;
            }
            dragHasMoved = false;
        }

        function moveInteraction(e) {
            if (!isDragging || !activeState) return;
            e.preventDefault(); // પેજ સ્ક્રોલ થતું અટકાવવા
            const coords = getCanvasCoords(e);
            
            let moveDiffX = Math.abs(coords.rawX - startMouseX);
            let moveDiffY = Math.abs(coords.rawY - startMouseY);

            // જો થોડુંક જ હલે તો એને ક્લિક જ ગણવું, ડ્રેગ નહિ 
            if (moveDiffX > 3 || moveDiffY > 3) dragHasMoved = true;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            activeState.dx = startDx + ((coords.rawX - startMouseX) * scaleX);
            activeState.dy = startDy + ((coords.rawY - startMouseY) * scaleY);
            generatePreview();
        }

        function endInteraction(e) {
            if (!isDragging) {
                // જો ડ્રેગ ન થયું હોય (એટલે કે માત્ર ક્લિક થયું હોય)
                if (!dragHasMoved) {
                    const coords = getCanvasCoords(e.changedTouches ? e.changedTouches[0] : e);
                    const masks = getMasksPx();
                    if (isCoordInMask(coords, masks.left)) leftFilePicker.click();
                    else if (isCoordInMask(coords, masks.right)) rightFilePicker.click();
                }
            }
            isDragging = false;
            activeState = null;
        }

        // માઉસ ઈવેન્ટ્સ
        canvas.addEventListener('mousedown', startInteraction);
        window.addEventListener('mousemove', moveInteraction, { passive: false });
        window.addEventListener('mouseup', endInteraction);

        // ટચ (મોબાઈલ) ઈવેન્ટ્સ
        canvas.addEventListener('touchstart', (e) => {
            if(e.touches.length === 2) {
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            } else {
                startInteraction(e);
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if(e.touches.length === 2 && initialPinchDistance && activeState) {
                e.preventDefault();
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                
                let pinchScale = currentDistance / initialPinchDistance;
                activeState.scale *= pinchScale;
                initialPinchDistance = currentDistance;
                generatePreview();
            } else {
                moveInteraction(e);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if(e.touches.length < 2) initialPinchDistance = null;
            endInteraction(e);
        });

        // --- ઝૂમ (Zoom) માઉસ વ્હીલ થી ---
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const coords = getCanvasCoords(e);
            const masks = getMasksPx();
            let targetState = null;
            let maskPx = null;

            if (leftState.src && isCoordInMask(coords, masks.left)) { targetState = leftState; maskPx = masks.left; }
            else if (rightState.src && isCoordInMask(coords, masks.right)) { targetState = rightState; maskPx = masks.right; }

            if (!targetState) return;

            const zoomSpeed = 0.05;
            const oldScale = targetState.scale;
            if (e.deltaY < 0) targetState.scale *= (1 + zoomSpeed); // Zoom In
            else targetState.scale *= (1 - zoomSpeed); // Zoom Out

            // માઉસ પોઈન્ટરની જગ્યાએ જ ઝૂમ થાય તે માટે ગણતરી
            let mouseXInMask = coords.x - maskPx.x;
            let mouseYInMask = coords.y - maskPx.y;
            
            let imgX = (mouseXInMask - targetState.dx) / oldScale;
            let imgY = (mouseYInMask - targetState.dy) / oldScale;

            targetState.dx = mouseXInMask - (imgX * targetState.scale);
            targetState.dy = mouseYInMask - (imgY * targetState.scale);

            generatePreview();
        }, { passive: false });

        function generatePreview() {
            if (!templateImg.complete) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const masks = getMasksPx();

            function drawPlaceholder(ctx, maskPx, text) {
                ctx.save();
                ctx.font = "bold 50px 'Plus Jakarta Sans'";
                ctx.fillStyle = "#cbd5e1";
                ctx.textAlign = "center";
                ctx.fillText(text, maskPx.x + maskPx.w / 2, maskPx.y + maskPx.h / 2);
                ctx.restore();
            }

            // અપડેટ કરેલું ડ્રોઇંગ ફંક્શન જે ઝૂમ અને ડ્રેગને સપોર્ટ કરે છે
            function drawImageWithState(state, maskPx) {
                ctx.save(); 
                ctx.beginPath();
                ctx.rect(maskPx.x, maskPx.y, maskPx.w, maskPx.h);
                ctx.clip(); 
                
                let renderW = state.img.width * state.scale;
                let renderH = state.img.height * state.scale;
                let finalX = maskPx.x + state.dx;
                let finalY = maskPx.y + state.dy;
                
                ctx.drawImage(state.img, finalX, finalY, renderW, renderH);
                ctx.restore(); 
            }

            if (leftState.src) drawImageWithState(leftState, masks.left);
            else drawPlaceholder(ctx, masks.left, "Click to Upload Left");

            if (rightState.src) drawImageWithState(rightState, masks.right);
            else drawPlaceholder(ctx, masks.right, "Click to Upload Right");

            ctx.drawImage(templateImg, 0, 0, canvas.width, canvas.height);
        }

        function resetControls() { 
            leftState.src = ""; leftState.scale = 1; leftState.dx = 0; leftState.dy = 0;
            rightState.src = ""; rightState.scale = 1; rightState.dx = 0; rightState.dy = 0;
            generatePreview(); 
        }

        function downloadJPG() {
            const link = document.createElement('a');
            link.download = 'Print_HK721.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: 'a4' });
            pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, pdf.internal.pageSize.getWidth(), pdf.internal.pageSize.getHeight());
            pdf.save("Print_HK721.pdf");
        }
    </script>
</body>
</html>
