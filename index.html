<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Cover Print App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; text-align: center; }
        .controls { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold;}
        .btn:hover { background: #0056b3; }
        canvas { max-width: 100%; height: auto; border: 1px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.2); background: white; margin-top: 10px;}
        .upload-group { margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 5px; }
        #status { color: green; font-weight: bold; margin-bottom: 10px;}
    </style>
</head>
<body>

    <div class="controls">
        <h2>Cover Print Setup (Personal Use)</h2>
        <div id="status">Template pre-loaded from repository</div>

        <div class="upload-group">
            <label><b>1. Upload Left Image:</b> </label>
            <input type="file" id="leftUpload" accept="image/*">
        </div>
        
        <div class="upload-group">
            <label><b>2. Upload Right Image:</b> </label>
            <input type="file" id="rightUpload" accept="image/*">
        </div>

        <button class="btn" onclick="generatePreview()">1. Update Preview</button>
        <button class="btn" onclick="downloadJPG()">2. Download JPG</button>
        <button class="btn" onclick="downloadPDF()">3. Download PDF (Landscape)</button>
    </div>

    <canvas id="myCanvas"></canvas>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');

        // Setup variables
        let templateImg = new Image();
        let leftImg = new Image();
        let rightImg = new Image();

        // 1. ZAROORI CHANGE: Automating Template Loading
        // **********************************************************
        // YAHAN AAPKO APNE TEMPLATE IMAGE KA EXACT NAAM LIKHNA HAI 
        // (Jo aapne GitHub me upload kiya hai, e.g., 'template.png')
        templateImg.src = 'template.png'; 
        // **********************************************************

        // Template load hone ke baad kuch initial setups (like setting canvas size) karein
        templateImg.onload = function() {
            canvas.width = templateImg.width; 
            canvas.height = templateImg.height;
            document.getElementById('status').innerHTML = "Template loaded: " + canvas.width + "x" + canvas.height + " px. Ready!";
            // Starting clear
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(templateImg, 0, 0); 
        };

        // Images upload handlers (for user photos)
        document.getElementById('leftUpload').addEventListener('change', function(e) { loadImg(e.target.files[0], leftImg); });
        document.getElementById('rightUpload').addEventListener('change', function(e) { loadImg(e.target.files[0], rightImg); });

        function loadImg(file, imgObj) {
            const reader = new FileReader();
            reader.onload = function(event) { imgObj.src = event.target.result; }
            if (file) reader.readAsDataURL(file);
        }

        function generatePreview() {
            // Safe checking
            if (!templateImg.complete || templateImg.naturalWidth === 0) {
                alert("Template image not found in repository. Make sure 'template.png' is uploaded to GitHub repo root folder.");
                return;
            }

            // Canvas clear & base layer
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // X, Y, Width, Height (Adjust these decimals slightly if needed for fit)
            let leftBox = { x: canvas.width * 0.12, y: canvas.height * 0.03, w: canvas.width * 0.35, h: canvas.height * 0.94 };
            let rightBox = { x: canvas.width * 0.55, y: canvas.height * 0.03, w: canvas.width * 0.35, h: canvas.height * 0.94 };

            // 1. Draw Left Image (Bottom layer)
            if (leftImg.src) ctx.drawImage(leftImg, leftBox.x, leftBox.y, leftBox.w, leftBox.h);

            // 2. Draw Right Image (Bottom layer)
            if (rightImg.src) ctx.drawImage(rightImg, rightBox.x, rightBox.y, rightBox.w, rightBox.h);

            // 3. Draw Template PNG on TOP (Mask layer)
            ctx.drawImage(templateImg, 0, 0, canvas.width, canvas.height);
        }

        function downloadJPG() {
            const link = document.createElement('a');
            link.download = 'Ready_To_Print_Covers.jpg';
            link.href = canvas.toDataURL('image/jpeg', 1.0);
            link.click();
        }

        function downloadPDF() {
            window.jspdf = window.jspdf || {};
            const { jsPDF } = window.jspdf;
            
            // Landscape A4 PDF
            const pdf = new jsPDF({
                orientation: 'landscape',
                unit: 'px',
                format: 'a4'
            });

            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

            pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
            pdf.save("Ready_To_Print_Covers.pdf");
        }
    </script>
</body>
</html>
