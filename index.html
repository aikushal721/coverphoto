<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Image Placement Editor</title>
    <style>
        /* પેજનું સામાન્ય સ્ટાઈલિંગ */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        h2 {
            color: #333;
        }

        /* ફોટો અપલોડ બટનની ડિઝાઈન */
        .upload-container {
            margin-bottom: 20px;
        }

        input[type="file"] {
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
        }

        /* મુખ્ય બોક્સ જ્યાં ફોટો દેખાશે */
        .canvas-box {
            width: 320px;  /* તમે અહી બોક્સની પહોળાઈ બદલી શકો છો */
            height: 500px; /* તમે અહી બોક્સની ઉંચાઈ બદલી શકો છો */
            border: 2px dashed #4CAF50;
            border-radius: 10px;
            background-color: #ffffff;
            overflow: hidden; /* આનાથી ફોટો બોક્સની બહાર નહિ જાય */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            touch-action: none; /* મોબાઈલમાં પેજને સ્ક્રોલ થતું અટકાવશે */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .canvas-box:active {
            cursor: grabbing;
        }

        /* અંદરનો ફોટો */
        #editableImage {
            display: none; /* ફોટો અપલોડ થાય ત્યાં સુધી છુપાવેલો રહેશે */
            position: absolute;
            transform-origin: center center;
            pointer-events: none; /* જેથી માઉસના બધા કમાન્ડ મુખ્ય બોક્સ પર જ લાગુ પડે */
        }

        .instructions {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Image Setup Studio</h2>

    <div class="upload-container">
        <input type="file" id="imageUploader" accept="image/*">
    </div>

    <div class="canvas-box" id="canvasBox">
        <img id="editableImage" src="" alt="Uploaded Image">
    </div>

    <div class="instructions">
        <p><b>Desktop:</b> માઉસ વ્હીલ ફેરવીને Zoom કરો અને માઉસ દબાવી રાખીને ખસેડો.</p>
        <p><b>Mobile:</b> 2 આંગળીથી Pinch-Zoom કરો અને 1 આંગળીથી ખસેડો.</p>
    </div>

    <script>
        const imageUploader = document.getElementById('imageUploader');
        const editableImage = document.getElementById('editableImage');
        const canvasBox = document.getElementById('canvasBox');

        // ઈમેજ સેટ કરવા માટેના વેરીએબલ્સ
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        
        let isDragging = false;
        let startX, startY;
        let initialPinchDistance = null;

        // 1. ફોટો અપલોડ થાય ત્યારે
        imageUploader.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const imageUrl = URL.createObjectURL(file);
                
                // જૂની ઈમેજ લોડ થાય એટલે તેની સાઈઝ રિસેટ કરવી
                editableImage.onload = function() {
                    scale = 1; // ડીફોલ્ટ ઝૂમ
                    
                    // જો ઈમેજ બહુ મોટી હોય તો બોક્સમાં ફિટ કરવા માટે બેઝિક સ્કેલિંગ
                    const boxRatio = canvasBox.clientWidth / canvasBox.clientHeight;
                    const imgRatio = this.naturalWidth / this.naturalHeight;
                    
                    if(this.naturalWidth > canvasBox.clientWidth || this.naturalHeight > canvasBox.clientHeight){
                         if(imgRatio > boxRatio) {
                             scale = canvasBox.clientHeight / this.naturalHeight;
                         } else {
                             scale = canvasBox.clientWidth / this.naturalWidth;
                         }
                    }

                    translateX = 0;
                    translateY = 0;
                    updateTransform();
                    editableImage.style.display = 'block';
                };
                
                editableImage.src = imageUrl;
            }
        });

        // ઈમેજને ખસેડવા અને ઝૂમ કરવા માટેનું મુખ્ય ફંક્શન
        function updateTransform() {
            editableImage.style.transform = `translate(calc(-50% + ${translateX}px), calc(-50% + ${translateY}px)) scale(${scale})`;
            editableImage.style.left = '50%';
            editableImage.style.top = '50%';
        }

        // 2. Desktop: માઉસ વ્હીલથી Zoom
        canvasBox.addEventListener('wheel', (e) => {
            if(editableImage.style.display === 'none') return;
            e.preventDefault();
            
            // વ્હીલ ઉપર-નીચે કરવાથી ઝૂમ વધશે/ઘટશે
            const zoomSpeed = 0.05;
            if (e.deltaY < 0) {
                scale += zoomSpeed; // Zoom In
            } else {
                scale -= zoomSpeed; // Zoom Out
            }
            
            scale = Math.max(0.1, Math.min(scale, 10)); // લિમિટ સેટ કરી (બહુ નાનું કે મોટું ન થાય)
            updateTransform();
        });

        // 3. Desktop: માઉસથી ખસેડવું (Drag)
        canvasBox.addEventListener('mousedown', (e) => {
            if(editableImage.style.display === 'none') return;
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // 4. Mobile: ટચ કંટ્રોલ (Pinch Zoom અને Drag)
        canvasBox.addEventListener('touchstart', (e) => {
            if(editableImage.style.display === 'none') return;
            
            if (e.touches.length === 2) {
                // બે આંગળી વચ્ચેનું અંતર
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            } else if (e.touches.length === 1) {
                // એક આંગળીથી ડ્રેગ
                isDragging = true;
                startX = e.touches[0].clientX - translateX;
                startY = e.touches[0].clientY - translateY;
            }
        });

        canvasBox.addEventListener('touchmove', (e) => {
            if(editableImage.style.display === 'none') return;
            e.preventDefault(); // ડિફોલ્ટ પેજ સ્ક્રોલિંગ અટકાવવા
            
            if (e.touches.length === 2 && initialPinchDistance !== null) {
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                
                const distanceDiff = currentDistance - initialPinchDistance;
                scale += distanceDiff * 0.005; // ઝૂમ સ્પીડ
                scale = Math.max(0.1, Math.min(scale, 10));
                
                initialPinchDistance = currentDistance;
                updateTransform();
            } else if (e.touches.length === 1 && isDragging) {
                translateX = e.touches[0].clientX - startX;
                translateY = e.touches[0].clientY - startY;
                updateTransform();
            }
        }, { passive: false }); // passive: false એ preventDefault માટે જરૂરી છે

        canvasBox.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                initialPinchDistance = null;
            }
            if (e.touches.length === 0) {
                isDragging = false;
            }
        });
    </script>
</body>
</html>
